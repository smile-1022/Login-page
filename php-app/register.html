<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUVI App – Sign Up</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="page-wrapper">
        <div class="card-container">
            <div class="card-wave"></div>
            <div class="card-body">
                <h1 class="page-title">Sign Up</h1>

                <div id="alert-msg" class="alert-msg"></div>

                <div class="mb-3">
                    <label class="form-label fw-semibold small" for="first_name">First name</label>
                    <input type="text" id="first_name" class="form-control custom-input" placeholder="Enter first name" autocomplete="given-name">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold small" for="last_name">Last name</label>
                    <input type="text" id="last_name" class="form-control custom-input" placeholder="Enter last name" autocomplete="family-name">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold small" for="email">E-mail</label>
                    <input type="email" id="email" class="form-control custom-input" placeholder="your@email.com" autocomplete="email">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold small" for="password">Password</label>
                    <input type="password" id="password" class="form-control custom-input" placeholder="Min. 6 characters" autocomplete="new-password">
                </div>

                <div class="form-check mb-2">
                    <input type="checkbox" id="terms" class="form-check-input">
                    <label class="form-check-label small text-muted" for="terms">
                        I agree to the processing of <a href="#" class="text-pink">personal data</a>
                    </label>
                </div>

                <div class="form-check mb-2">
                    <input type="checkbox" id="remember" class="form-check-input">
                    <label class="form-check-label small text-muted" for="remember">Remember me on this device</label>
                </div>

                <button id="btn-register" class="btn-primary-pink">Sign Up</button>

                <div class="link-bottom">
                    Already have an account? <a href="login.html">Login</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
