<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUVI App – Forgot Password</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="page-wrapper">
        <div class="card-container">
            <div class="card-wave"></div>
            <div class="card-body">
                <h1 class="page-title">Forgot<br>Password?</h1>

                <p class="mb-4 text-muted small">Enter your registered email and we'll send you a reset link.</p>

                <div id="alert-msg" class="alert-msg"></div>

                <div id="form-section">
                    <div class="mb-3">
                        <label class="form-label fw-semibold small" for="email">E-mail</label>
                        <input type="email" id="email" class="form-control custom-input" placeholder="your@email.com" autocomplete="email">
                    </div>

                    <button id="btn-forgot" class="btn-primary-pink">Send Reset Link</button>
                </div>

                <div id="reset-link-section" style="display:none">
                    <div class="reset-info-box">
                        <div class="reset-info-icon">&#128274;</div>
                        <p class="reset-info-label">Your password reset link</p>
                        <a id="reset-link-anchor" href="#" class="reset-link-text" target="_blank"></a>
                        <p class="reset-info-note">This link expires in <strong>15 minutes</strong>. In production this would be sent to your email.</p>
                    </div>
                </div>

                <div class="link-bottom">
                    Remembered it? <a href="login.html">Back to Login</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/forgot-password.js"></script>
</body>
</html>
