<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUVI App – Reset Password</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="page-wrapper">
        <div class="card-container">
            <div class="card-wave"></div>
            <div class="card-body">
                <h1 class="page-title">Reset<br>Password</h1>

                <div id="alert-msg" class="alert-msg"></div>

                <div id="form-section">
                    <div class="mb-3">
                        <label class="form-label fw-semibold small" for="new-password">New Password</label>
                        <input type="password" id="new-password" class="form-control custom-input" placeholder="Min. 6 characters" autocomplete="new-password">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold small" for="confirm-password">Confirm Password</label>
                        <input type="password" id="confirm-password" class="form-control custom-input" placeholder="Repeat your new password" autocomplete="new-password">
                    </div>

                    <button id="btn-reset" class="btn-primary-pink">Reset Password</button>
                </div>

                <div id="expired-section" style="display:none">
                    <div class="expired-box">
                        <div class="expired-icon">&#9203;</div>
                        <p class="expired-text">This reset link has <strong>expired</strong> or is invalid.</p>
                        <a href="forgot-password.html" class="btn-primary-pink d-block text-center text-decoration-none mt-3">Request a New Link</a>
                    </div>
                </div>

                <div class="link-bottom">
                    <a href="login.html">Back to Login</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/reset-password.js"></script>
</body>
</html>
