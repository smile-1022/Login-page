<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUVI App – Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="page-wrapper">

        <div class="left-panel">
            <div class="left-panel-inner">
                <div class="left-logo">GUVI</div>
                <h2 class="left-heading">Welcome Back</h2>
                <p class="left-desc">Sign in to access your profile and continue where you left off.</p>
                <div class="left-features">
                    <div class="left-feature-item"><span class="left-feature-icon">&#10003;</span> Secure login with Redis sessions</div>
                    <div class="left-feature-item"><span class="left-feature-icon">&#10003;</span> Session stored in your browser</div>
                    <div class="left-feature-item"><span class="left-feature-icon">&#10003;</span> Auto-redirect if already logged in</div>
                </div>
            </div>
        </div>

        <div class="right-panel">
            <div class="card-container">
                <div class="card-wave"></div>
                <div class="card-body">
                    <h1 class="page-title">Login</h1>

                    <div id="alert-msg" class="alert-msg"></div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold small" for="email">E-mail</label>
                        <input type="email" id="email" class="form-control custom-input" placeholder="your@email.com" autocomplete="email">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold small" for="password">Password</label>
                        <input type="password" id="password" class="form-control custom-input" placeholder="Your password" autocomplete="current-password">
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <div class="form-check">
                            <input type="checkbox" id="remember" class="form-check-input">
                            <label class="form-check-label small text-muted" for="remember">Remember me</label>
                        </div>
                        <a href="forgot-password.html" class="small fw-semibold forgot-link">Forgot password?</a>
                    </div>

                    <button id="btn-login" class="btn-primary-pink">Login</button>

                    <div class="link-bottom">
                        Don't have an account? <a href="register.html">Sign Up</a>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
